    <h1>隱私權政策</h1>
    <p>本應用程式（以下簡稱「本 App」）尊重並保護所有使用者的文字隱私權。</p>
    
    <h3>1. 資料收集</h3>
    <p>我們本身不會收集、儲存或分享使用者的個人識別資料。您的收藏金句僅儲存於您個人的裝置中。</p>
    
    <h3>2. 第三方服務（廣告）</h3>
    <p>本 App 使用 Google AdMob 作為廣告供應商。AdMob 可能會收集並使用您的廣告識別碼（Advertising ID）來提供個人化廣告。相關資訊請參考 <a href="https://policies.google.com/privacy">Google 隱私權條款</a>。</p>
    
    <h3>3. 聯絡我們</h3>
    <p>如果您對本政策有任何疑問，請透過以下方式聯絡：[darkencrowapp@gmail.com]</p>
